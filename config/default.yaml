elasticsearch:
  url: "http://172.17.123.119:9200"
  index: "science_docs"

qdrant:
  url: "http://localhost:6333"
  collection: "science_docs"
  vector_size: 4096

paths:
  documents: "data/documents.jsonl"
  eval: "data/eval.jsonl"
  user_dict_out: "artifacts/user_dict.txt"

# 리더보드 채점은 topk 상위 3개 사용 (baseline_code README)
submission_top_k: 3

embedding:
  model_name: "Qwen/Qwen3-Embedding-8B"
  query_instruction: 'Instruct: Given a question, retrieve relevant Korean science passages that answer the question\nQuery: '
  text_instruction: "Instruct: Encode this Korean science passage to be retrieved for science questions\nPassage: "
  max_length: 8192
  trust_remote_code: true # Qwen 모델은 true 필요

# Reranker (선택) — scripts/export_submission.py --pipeline 시 사용
# 초반 실험: Qwen/Qwen3-Reranker-4B (~10GB)
# 최종 제출: Qwen/Qwen3-Reranker-8B (~18GB)
reranker:
  model_name: "artifacts/qwen3-reranker-8b-science"
  trust_remote_code: true # Qwen 모델은 true 필요

# vLLM 서빙 URL (선택) — scripts/serve_vllm.py 기동 후 설정
# 미설정 시 HuggingFaceLLM 직접 로드
# vllm:
#   url: "http://localhost:8000"
#   model_name: "science-rag"

# 로컬 LLM (vllm 미설정 시 사용)
# checkpoint: 로컬 fine-tuned 모델 경로 지정 시 해당 가중치 사용
#             null 이면 model_name(HuggingFace hub) 직접 로드
# 예시:
#   checkpoint: "artifacts/qwen35-4b-science-rag"  # SFT 어댑터; train_sft 가 merged/ 병합본도 저장하면 자동 우선 로드
#   checkpoint: null                                # HuggingFace 기본 모델
llm:
  model_name: "Qwen/Qwen3.5-4B"
  checkpoint: "artifacts/qwen35-4b-rag-sft"
  # Qwen 등 trust_remote_code 필요 모델용 (기본 true)
  # trust_remote_code: true
  max_new_tokens: 512
  context_window: 4096

# Phase 0(standalone·HyDE·alt_query)·Phase 3(answer)를 Solar Pro API로만 쓰려면:
#   python scripts/export_submission.py --pipeline ... --phase0-api solar --phase3-api solar
# .env 에 SOLAR_API_KEY 필요. 미지정 시 위 llm 블록의 로컬 HuggingFace 모델 사용.
